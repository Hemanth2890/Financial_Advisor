services:
  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: finadvisor
      POSTGRES_PASSWORD: finadvisor
      POSTGRES_DB: finadvisor
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg2://finadvisor:finadvisor@postgres:5432/finadvisor
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8002:8000"
    depends_on:
      - redis
      - postgres

  worker:
    build: .
    command: celery -A tasks.celery_app.celery_app worker --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg2://finadvisor:finadvisor@postgres:5432/finadvisor
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      - redis
      - postgres

volumes:
  pgdata:
